# Hope testnet peer — pull the published image (no chain repo required).
# Usage: docker compose --env-file .env up -d
services:
  hope-peer:
    image: ${HOPE_PEER_IMAGE:-public.ecr.aws/r8k0t0l9/hope-peer:testnet}
    platform: ${DOCKER_PLATFORM:-}
    container_name: hope-peer
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "26656:26656"
      - "26657:26657"
    volumes:
      - hope-peer-data:/home/hope/.hope
    healthcheck:
      test: ["CMD", "/usr/local/bin/peer-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s
    environment:
      CHAIN_ID: ${CHAIN_ID:-hope-testnet-2}
      MONIKER: ${MONIKER:-hope-peer}
      CHAIN_METADATA_URL: https://test-gateway.hopenetwork.io/chain.json
      SEEDS: ${SEEDS:-}
      PERSISTENT_PEERS: ${PERSISTENT_PEERS:-}
      STATE_SYNC: ${STATE_SYNC:-true}
      FORCE_STATE_SYNC: ${FORCE_STATE_SYNC:-false}
      STATE_SYNC_RPC_URL: ${STATE_SYNC_RPC_URL:-https://test-gateway.hopenetwork.io/rpc}
      STATE_SYNC_RPC: ${STATE_SYNC_RPC:-3.21.91.67:26657}
      RPC_SERVERS: ${RPC_SERVERS:-3.21.91.67:26657}
      PAYOUT_RECIPIENT: ${PAYOUT_RECIPIENT:-}
      HOPE_OPERATOR_MNEMONIC: ${HOPE_OPERATOR_MNEMONIC:-}
      AUTO_REGISTER_INCENTIVES: ${AUTO_REGISTER_INCENTIVES:-true}
      AUTO_CLAIM_PEER_GRANT: ${AUTO_CLAIM_PEER_GRANT:-true}
      AUTO_HEARTBEAT: ${AUTO_HEARTBEAT:-false}
      AUTO_SYNC_PROOF: ${AUTO_SYNC_PROOF:-true}
      AUTO_UPDATE_ENDPOINTS: ${AUTO_UPDATE_ENDPOINTS:-true}
      SYNC_PROOF_INTERVAL_SEC: ${SYNC_PROOF_INTERVAL_SEC:-7200}
      NODE_LABEL: ${NODE_LABEL:-docker-peer}
      EXTERNAL_ADDRESS: ${EXTERNAL_ADDRESS:-}
      AUTO_DETECT_EXTERNAL_ADDRESS: ${AUTO_DETECT_EXTERNAL_ADDRESS:-true}
      RPC_URL: ${RPC_URL:-}
      HOPE_TX_NODE: ${HOPE_TX_NODE:-https://test-gateway.hopenetwork.io/rpc/}

volumes:
  hope-peer-data:
    name: hope-peer-data
